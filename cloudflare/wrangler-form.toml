name = "ppforms"
main = "form-worker.js"
compatibility_date = "2026-04-27"
account_id = "a69ce5c1cf6b705438ee7028f37cb30b"

workers_dev = true

[[d1_databases]]
binding = "FORM_DB"
database_name = "ppforms_db"
database_id = "3bca5190-8e8f-4d53-bbf4-c7b15ade1cf6"

[[r2_buckets]]
binding = "FORM_UPLOADS"
bucket_name = "ppforms-uploads"

[vars]
FORM_ALLOWED_ORIGIN = "https://planespro.cl,https://asesores.planespro.cl,http://127.0.0.1:5500,http://127.0.0.1:5501,http://localhost:5500,http://localhost:5501"
ADMIN_API_KEY = "ppcrm_dev_20260425_9f6c2c8e1a4b"
GOOGLE_OAUTH_CLIENT_ID = "1031168669106-040i5uck3h8p8dmht0qpobou074mpoec.apps.googleusercontent.com"
# IMPORTANT: Keep the OAuth callback on `form.planespro.cl` (this Worker owns the OAuth exchange).
# After exchanging the code, we redirect the browser back to `return_to` (typically `asesores.planespro.cl/crm/`).
GOOGLE_OAUTH_REDIRECT_URI = "https://form.planespro.cl/api/auth/google/callback"

[[routes]]
pattern = "form.planespro.cl/*"
zone_name = "planespro.cl"

[observability.logs]
enabled = true
